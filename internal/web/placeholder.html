<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FireVoiceBox — UI not built</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font: 16px/1.5 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        color: #1f2937;
        background: #f8fafc;
      }
      @media (prefers-color-scheme: dark) {
        body { color: #e5e7eb; background: #0b1220; }
        code { background: #111827; }
      }
      main { max-width: 30rem; padding: 2rem; text-align: center; }
      h1 { font-size: 1.25rem; margin: 0 0 0.5rem; }
      code {
        padding: 0.15rem 0.4rem;
        border-radius: 0.35rem;
        background: #eef2ff;
        font-size: 0.9em;
      }
      p { margin: 0.5rem 0; color: inherit; opacity: 0.85; }
    </style>
  </head>
  <body>
    <main>
      <h1>Frontend not built</h1>
      <p>
        The React UI was not bundled into this binary. Build it with
        <code>make web</code> (or <code>pnpm --dir web build</code>) and
        recompile. Release binaries are built this way in CI.
      </p>
    </main>
  </body>
</html>
